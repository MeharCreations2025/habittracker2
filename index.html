<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Discipline - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script crossorigin src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #111827; color: #ffffff; margin: 0; font-family: sans-serif; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen text-gray-400">Loading App... (Check Internet Connection for CDN)</div>
    </div>

    <script type="text/babel">
        // Destructure from Global objects provided by UMD builds
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;
        
        // --- COMPONENTS ---
        const ProgressBar = ({ score }) => (
            <div className="mb-8 p-4 bg-gray-800/50 rounded-xl">
                <div className="flex justify-between items-center mb-2">
                    <h3 className="text-sm font-medium text-gray-400 uppercase tracking-wider">Progress</h3>
                    <span className="text-2xl font-bold text-blue-400">{score}%</span>
                </div>
                <div className="w-full bg-gray-700 rounded-full h-3">
                    <motion.div 
                        initial={{ width: 0 }} 
                        animate={{ width: `${score}%` }} 
                        className="h-3 rounded-full bg-gradient-to-r from-blue-600 to-blue-400" 
                    />
                </div>
            </div>
        );

        const HabitCard = ({ name, status, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center p-4 mb-3 rounded-xl border transition-all ${
                    status === 'completed' 
                    ? 'bg-green-900/20 border-green-500/50 text-green-100' 
                    : 'bg-gray-800 border-gray-700 hover:border-gray-500 text-white'
                }`}
            >
                <div className={`mr-4 w-6 h-6 rounded-full border-2 flex items-center justify-center ${
                    status === 'completed' ? 'bg-green-500 border-green-500' : 'border-gray-500'
                }`}>
                    {status === 'completed' && <span>✓</span>}
                </div>
                <span className="font-medium">{name}</span>
            </button>
        );

        const App = () => {
            const [habits, setHabits] = useState([
                { id: 1, name: 'Wazifa (Fajr)', period: 'fajr', status: 'pending' },
                { id: 2, name: 'Quran Reading', period: 'fajr', status: 'pending' },
                { id: 3, name: 'Work/Study', period: 'dhuhr', status: 'pending' },
                { id: 4, name: 'Exercise', period: 'asr', status: 'pending' },
                { id: 5, name: 'Family Time', period: 'isha', status: 'pending' }
            ]);

            const toggleHabit = (id) => {
                setHabits(prev => prev.map(h => 
                    h.id === id ? { ...h, status: h.status === 'completed' ? 'pending' : 'completed' } : h
                ));
            };

            const score = Math.round((habits.filter(h => h.status === 'completed').length / habits.length) * 100);

            return (
                <div className="max-w-md mx-auto px-4 py-10">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-extrabold text-white mb-2">Daily Discipline</h1>
                        <p className="text-gray-400">Faisalabad Tracker</p>
                    </header>

                    <ProgressBar score={score} />

                    <div className="space-y-6">
                        {['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'].map(period => {
                            const periodHabits = habits.filter(h => h.period === period);
                            if (periodHabits.length === 0) return null;
                            return (
                                <div key={period}>
                                    <h2 className="text-xs font-bold text-gray-500 uppercase mb-3 tracking-widest px-1">{period}</h2>
                                    {periodHabits.map(h => (
                                        <HabitCard 
                                            key={h.id} 
                                            name={h.name} 
                                            status={h.status} 
                                            onClick={() => toggleHabit(h.id)} 
                                        />
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
